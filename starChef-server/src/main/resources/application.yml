server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${starChef.datasource.driver-class-name}
      url: jdbc:mysql://${starChef.datasource.host}:${starChef.datasource.port}/${starChef.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${starChef.datasource.username}
      password: ${starChef.datasource.password}
  redis:
    host: ${starChef.redis.host}
    port: ${starChef.redis.port}
#    password: ${starChef.redis.password}
    database: ${starChef.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.starChef.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      starChef:
        mapper: debug
        service: info
        controller: info

starChef:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

    user-secret-key: itheima
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${starChef.alioss.endpoint}
    access-key-id: ${starChef.alioss.access-key-id}
    access-key-secret: ${starChef.alioss.access-key-secret}
    bucket-name: ${starChef.alioss.bucket-name}
  wechat:
    appid: ${starChef.wechat.appid}
    secret: ${starChef.wechat.secret}
